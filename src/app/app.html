<header id="collection-header">
  <h1>My collection</h1>
  <div>
    <app-search-bar
      (searchButtonClicked)="increamentCount()"
      [(search)]="searchText"
    ></app-search-bar>
    Clicked count: {{count}}
    <br />
    Search text: {{searchText}}
  </div>
</header>
<section class="collection-grid">
  <app-collection-item-card [item]="goku"></app-collection-item-card>
  <app-collection-item-card [item]="vegeta"></app-collection-item-card>
  <app-collection-item-card [item]="gogeta"></app-collection-item-card>
  <app-collection-item-card [item]="vegeto"></app-collection-item-card>
  <app-collection-item-card [item]="naruto"></app-collection-item-card>
</section>
